services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oa_scrapper
      POSTGRES_USER: oa_user
      POSTGRES_PASSWORD: oa_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oa_user -d oa_scrapper"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: oa_paper_scrapper_backend
    working_dir: /app
    command: >
      bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://oa_user:oa_password@db:5432/oa_scrapper
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: oa_paper_scrapper_frontend
    working_dir: /app
    command: npx ng serve frontend --host 0.0.0.0 --port 4200 --allowed-hosts
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  postgres_data:
