<div class="form-shell">
  <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
    <div>
      <p class="form-kicker mb-2">Input source</p>
      <h2 class="form-title mb-0">Paper retrieval form (it wont look like that) (i know its ugly)</h2>
    </div>
  </div>

  <p class="form-description">
    Start with a single DOI or paste multiple DOI values. Later, this form will
    trigger retrieval and extraction of selected paper sections.
  </p>

  <div class="row g-3">
    <div class="col-12">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Single DOI</mat-label>
        <input
          matInput
          [(ngModel)]="singleDoi"
          placeholder="e.g. 10.1000/xyz123"
        />
      </mat-form-field>
    </div>

    <div class="col-12">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Multiple DOIs</mat-label>
        <textarea
          matInput
          rows="6"
          [(ngModel)]="multipleDois"
          placeholder="Paste one DOI per line"
        ></textarea>
      </mat-form-field>
    </div>
  </div>

  <div class="d-flex gap-2 flex-wrap mt-2">
    <button mat-flat-button class="analyze-btn" (click)="submitForm()">
      Analyze papers
    </button>

    <button mat-stroked-button (click)="clearForm()">
      Clear
    </button>
  </div>
</div>
